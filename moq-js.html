<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Thom's Players - moq-js</title>

  <!-- Bootstrap -->
  <link href="css/bootstrap.flatly.min.css" title="default" rel="stylesheet">
  <link href="css/bootstrap.darkly.min.css" title="dark" rel="stylesheet">
  <link href="css/ie10-viewport-bug-workaround.css" rel="stylesheet">
  <link href="css/jumbotron-narrow.css" rel="stylesheet">

  <!-- Style Switcher -->
  <script src="js/docs-themes.js" type="text/javascript"></script>
  <script type="text/javascript">set_style();</script>

  <!-- moq-js -->
  <script src="https://cdn.jsdelivr.net/npm/@moq-js/player@latest/dist/moq-player.iife.js"></script>

  <!-- JQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>

</head>

<body>

  <div class="container">
    <div class="header clearfix">
      <nav>
        <ul class="nav nav-pills pull-right">
          <li role="presentation"><a href="index.html">Select a Player</a></li>
          <li role="presentation"><a href="#" onclick='switch_style("dark"); return false;'>Dark</a></li>
          <li role="presentation"><a href="#" onclick='switch_style("default"); return false;'>Light</a></li>
        </ul>
      </nav>
      <h3 class="text-muted">Thom's Players</h3>
    </div>

    <div class="jumbotron">
      <form id="playform">
        <div class="form-group">
          <label for="manifest">MOQ URL:</label>
          <input type="text" class="form-control" id="manifest" name="manifest"><br>
          <button id="hls-button" type="submit" class="btn btn-primary btn-lg">Play!</button><br><br>
        </div>

        <button type="button" id="demo" class="btn btn-info btn-sm">Load Demo HLS Manifest</button>
      </form>
    </div>

    <div class="jumbotron">
      <!-- Use the Web Component -->
	    <video-moq 
		src="https://example.com/my-moq-stream?namespace=demo" 
		width="640" 
		muted 
		controls>
	    </video-moq>
    </div>

    <div class="jumbotron">
      <p><small>moq-js Latest</small></p>
    </div>

    <script>

    // Play button
    $( "#hls-button" ).click(function( event ) {
console.log("Playing: " + $( "#manifest" ).val());
      const videoMoq = document.querySelector("video-moq");

// Set the stream URL and fingerprint dynamically
videoMoq.setAttribute("src", $( "#manifest" ).val());

// Listen for when the player is ready, then play
videoMoq.addEventListener("loadeddata", () => {
    // The component might auto-play depending on its internal logic, 
    // but you can programmatically trigger play if it exposes the method
    console.log("Stream data loaded, ready to play.");
});
      event.preventDefault();
    });

    $( "#demo" ).click(function( event ) {
      event.preventDefault();
    });

    </script>

    <footer class="footer">
      <p>&copy; Thom Shutt &amp; <a href="https://github.com/philcluff/phils-players#authors"> The Authors</a> 2023.</p>
    </footer>

  </div>

  <script src="js/ie10-viewport-bug-workaround.js"></script>
</body>
</html>
