<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoQ Stream Tester</title>
    
    <!-- Load moq-js Web Component via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@moq-js/player@latest/dist/moq-player.iife.js"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            gap: 8px;
        }
        label {
            font-weight: bold;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 30px;
        }
        button:hover {
            background-color: #004494;
        }
        .player-container {
            background-color: #000;
            width: 640px;
            min-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            border-radius: 8px;
            overflow: hidden;
        }
        /* Style the custom element slightly to ensure it fills the container if needed */
        video-moq {
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <h2>MoQ Stream Tester</h2>

    <div class="input-group">
        <label for="stream-url">MoQ Stream URL:</label>
        <input type="text" id="stream-url" placeholder="e.g., https://example.com/moq?namespace=demo">
    </div>

    <div class="input-group">
        <label for="fingerprint-url">Fingerprint URL (Optional - for self-signed certs):</label>
        <input type="text" id="fingerprint-url" placeholder="e.g., https://example.com/fingerprint">
    </div>

    <button id="load-btn">Load & Play Stream</button>

    <div class="player-container" id="player-container">
        <!-- The video-moq element will be injected here -->
        <p>No stream loaded</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadBtn = document.getElementById('load-btn');
            const container = document.getElementById('player-container');
            const urlInput = document.getElementById('stream-url');
            const fingerprintInput = document.getElementById('fingerprint-url');

            loadBtn.addEventListener('click', () => {
                const streamUrl = urlInput.value.trim();
                const fingerprintUrl = fingerprintInput.value.trim();

                if (!streamUrl) {
                    alert("Please enter a valid MoQ Stream URL.");
                    return;
                }

                // 1. Clear out the container (removes the previous player or placeholder text)
                container.innerHTML = '';

                // 2. Create a new instance of the video-moq web component
                const videoMoq = document.createElement('video-moq');
                
                // 3. Set the necessary attributes
                videoMoq.setAttribute('src', streamUrl);
                videoMoq.setAttribute('width', '640');
                videoMoq.setAttribute('controls', '');
                videoMoq.setAttribute('muted', ''); // Muting is recommended to allow auto-play in browsers

                if (fingerprintUrl) {
                    videoMoq.setAttribute('fingerprint', fingerprintUrl);
                }

                // 4. Append to the DOM. 
                // The component's internal lifecycle will automatically pick up the attributes and attempt to connect.
                container.appendChild(videoMoq);
            });
        });
    </script>

</body>
</html>
