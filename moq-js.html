<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoQ Stream Tester</title>
    
    <!-- Load moq-js Web Component via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@moq-js/player@latest/dist/moq-player.iife.js"></script>
 
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            gap: 8px;
        }
        label {
            font-weight: bold;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 30px;
        }
        button:hover {
            background-color: #004494;
        }
        .player-container {
            background-color: #000;
            width: 640px;
            min-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            border-radius: 8px;
            overflow: hidden;
        }
        /* Style the custom element slightly to ensure it fills the container if needed */
        video-moq {
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <h2>MoQ Stream Tester</h2>

<video-moq
	src="https://interop-relay.cloudflare.mediaoverquic.com:443/bbbthom"
	fingerprint="https://example.com/fingerprint"
	width="640"
	muted
	controls
></video-moq>

</body>
</html>
